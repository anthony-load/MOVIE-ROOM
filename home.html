<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>MOVIE ROOM HOME</title>
</head>
<body>
    <nav id="desktop-nav">
        <div class="logo">MOVIE ROOM</div>
        <div>
          <ul class="nav-links">
          <li><a href="fa fa-user">User</a></li>
      </div>
       </nav>
      <div class="container">
        <!-- Billboard / Hero Section -->
        <section class="billboard" id="billboard">
          <div class="billboard-content" id="billboardContent">
            <!-- Now Playing movie details will load here -->
          </div>
        </section>
    
        <!-- Upcoming Movies Section -->
        <section class="movie-section">
          <h2>Upcoming Movies</h2>
          <div class="movie-grid" id="movieGrid">
            <!-- Upcoming movies will load here -->
          </div>
        </section>
      </div>
    
        <!-- Only On Movie Room Section -->
        <section class="movie-section">
            <h2>ONLY ON EX</h2>
            <div class="movie-grid" id="movieGrid">
              <!-- Only On EX will load here -->
            </div>
          </section>
        </div>
</body>
</html>
